<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferretools - Login y Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"></div>
            <h1>Ferretools</h1>
            <p>Calidad y herramientas a tu alcance</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Iniciar Sesión</button>
            <button class="tab-btn" data-tab="register">Registrarse</button>
        </div>

        <div class="form-container">
            
            <div id="loginForm" class="form active-form">
                <div class="form-group">
                    <label> Número de celular</label>
                    <input type="tel" id="loginPhone" placeholder>
                </div>
                <div class="form-group">
                    <label> Contraseña</label>
                    <input type="password" id="loginPassword" placeholder>
                </div>
                <div class="show-password">
                    <input type="checkbox" id="showLoginPassword"> 
                    <label>Mostrar contraseña</label>
                </div>
                <button id="loginBtn">Ingresar</button>
                <div id="loginMessage" class="message"></div>
            </div>

            <div id="registerForm" class="form">
                <div class="row-2">
                    <div class="form-group">
                        <label> Nombres</label>
                        <input type="text" id="regFirstName" placeholder>
                    </div>
                    <div class="form-group">
                        <label> Apellidos</label>
                        <input type="text" id="regLastName" placeholder>
                    </div>
                </div>
                
                <div class="form-group">
                    <label> Número de celular</label>
                    <input type="tel" id="regPhone" placeholder>
                    <small>Será tu usuario para iniciar sesión</small>
                </div>
                
                <div class="form-group">
                    <label> Correo electrónico (opcional)</label>
                    <input type="email" id="regEmail" placeholder="correo@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label> Contraseña</label>
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="show-password">
                    <input type="checkbox" id="showRegPassword"> 
                    <label>Mostrar contraseña</label>
                </div>
                
                <div class="row-2">
                    <div class="form-group">
                        <label> Ciudad</label>
                        <select id="regCity">
                            <option value="Bogotá">Bogotá</option>
                            <option value="Medellín">Medellín</option>
                            <option value="Cali">Cali</option>
                            <option value="Barranquilla">Barranquilla</option>
                            <option value="Cartagena">Cartagena</option>
                            <option value="Bucaramanga">Bucaramanga</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label> Tipo de cliente</label>
                        <select id="regClientType">
                            <option value="natural">Natural</option>
                            <option value="juridico">Juridica</option>
                        </select>
                    </div>
                </div>
                
                <button id="registerBtn">Registrarse</button>
                <div id="registerMessage" class="message"></div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
